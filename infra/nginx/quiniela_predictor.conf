server {
    listen 80;
    listen [::]:80;
    server_name {{ server_name | default("_") }};

    client_max_body_size 25M;
    server_tokens off;

    access_log /var/log/nginx/quiniela_predictor_access.log;
    error_log /var/log/nginx/quiniela_predictor_error.log warn;

    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location ~* ^/(data|logs|models|cache|prediction_logs|security_logs|source_cache|raw|processed|current|active_draws)(/|$) {
        deny all;
        return 404;
    }

    location ~* \.(env|bak|backup|old|sql|sqlite|db|log|pem|key|tar|gz|zip)$ {
        deny all;
        return 404;
    }

    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; frame-ancestors 'none';" always;
}
