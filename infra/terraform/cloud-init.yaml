#cloud-config
package_update: true
package_upgrade: true

users:
  - name: ${deploy_user}
    groups: sudo, docker
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    ssh_authorized_keys:
      - ${ssh_public_key}

packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - lsb-release
  - ufw
  - nginx
  - certbot
  - python3-certbot-nginx
  - unattended-upgrades

write_files:
  - path: /etc/nginx/sites-available/quiniela_predictor.conf
    owner: root:root
    permissions: "0644"
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name ${server_name};

          client_max_body_size 25M;

          location ~ /\.(?!well-known) {
              deny all;
              return 404;
          }

          location ~* ^/(data|logs|models|cache|prediction_logs|security_logs|source_cache|raw|processed|current)(/|$) {
              deny all;
              return 404;
          }

          location ~* \.(env|bak|backup|old|sql|sqlite|db|log|pem|key)$ {
              deny all;
              return 404;
          }

          location / {
              proxy_pass http://127.0.0.1:8501;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout 86400;
          }

          add_header X-Frame-Options "DENY" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; frame-ancestors 'none';" always;
      }

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ${deploy_user}
  - mkdir -p /opt/quiniela_predictor_mx
  - chown -R ${deploy_user}:${deploy_user} /opt/quiniela_predictor_mx
  - ln -sf /etc/nginx/sites-available/quiniela_predictor.conf /etc/nginx/sites-enabled/quiniela_predictor.conf
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t
  - systemctl enable --now nginx
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - systemctl enable --now docker
  - systemctl enable unattended-upgrades
  - echo "AUTHORIZED_EMAILS=${authorized_email}" > /opt/quiniela_predictor_mx/.env.bootstrap
